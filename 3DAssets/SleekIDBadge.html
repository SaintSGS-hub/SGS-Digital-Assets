    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.arcTo(x + w, y, x + w, y + h, r)
      ctx.arcTo(x + w, y + h, x, y + h, r)
      ctx.arcTo(x, y + h, x, y, r)
      ctx.arcTo(x, y, x + w, y, r)
      ctx.closePath()
    }

    function wrapCenter(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ')
      let line = ''
      let yy = y
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' '
        if (ctx.measureText(test).width > maxWidth && i > 0) {
          ctx.fillText(line.trim(), x, yy)
          line = words[i] + ' '
          yy += lineHeight
        } else {
          line = test
        }
      }
      ctx.fillText(line.trim(), x, yy)
    }

    function wrapLeft(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ')
      let line = ''
      let yy = y
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' '
        if (ctx.measureText(test).width > maxWidth && i > 0) {
          ctx.fillText(line.trim(), x, yy)
          line = words[i] + ' '
          yy += lineHeight
        } else {
          line = test
        }
      }
      ctx.fillText(line.trim(), x, yy)
    }

    function drawInfo(ctx, x, y, w, h, label, value) {

      ctx.fillStyle = '#ffffff' // COR DO VALOR

      wrapLeft(ctx, value, x + 26, y + 74, w - 52, 34)
    }

    function updateRibbonGeometry(geometry, points, camera, width) {
      const positions = []
      const uvs = []
      const indices = []

      let totalLength = 0
      const lengths = [0]
      for (let i = 1; i < points.length; i++) {
        totalLength += points[i - 1].distanceTo(points[i])
        lengths.push(totalLength)
      }

      for (let i = 0; i < points.length; i++) {
        const prev = points[Math.max(0, i - 1)]
        const next = points[Math.min(points.length - 1, i + 1)]
        const tangent = next.clone().sub(prev).normalize()
        const viewDir = camera.position.clone().sub(points[i]).normalize()
        let side = new THREE.Vector3().crossVectors(tangent, viewDir).normalize()
        if (!Number.isFinite(side.x)) side = new THREE.Vector3(1, 0, 0)
        side.multiplyScalar(width * 0.4) // LARGURA REAL DA LANYARD

        const left = points[i].clone().add(side)
        const right = points[i].clone().sub(side)

        positions.push(left.x, left.y, left.z)
        positions.push(right.x, right.y, right.z)

        const u = totalLength > 0 ? lengths[i] / totalLength : 0
        uvs.push(u, 1)
        uvs.push(u, 0)

        if (i < points.length - 1) {
          const a = i * 2
          const b = a + 1
          const c = a + 2
          const d = a + 3
          indices.push(a, b, c, b, d, c)
        }
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3))
      geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2))
      geometry.setIndex(indices)
      geometry.computeVertexNormals()
      geometry.computeBoundingSphere()
    }

    function placeConnector(mesh, start, end) {
      // ==================================================
      // ESTE Ã‰ O CONECTOR ENTRE A LANYARD E O CARD
      // MEXA NO lowerConnector MAIS ABAIXO PARA VISUAL/ESPESSURA
      // ==================================================
      const dir = end.clone().sub(start)
      const len = dir.length()
      if (len < 0.0001) {
        mesh.visible = false
        return
      }
      mesh.visible = true
      mesh.position.copy(start).add(end).multiplyScalar(0.5)
      mesh.scale.set(1, len, 1)
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize())
    }

    await RAPIER.init()

    const world = new RAPIER.World({ x: 0, y: -40, z: 0 })

    function segmentDesc(x, y, z) {
      return RAPIER.RigidBodyDesc.dynamic()
        .setTranslation(x, y, z) // POSIÃ‡ÃƒO INICIAL DOS SEGMENTOS DA LANYARD
        .setLinearDamping(2)     // AMORTECIMENTO DE MOVIMENTO
        .setAngularDamping(2)    // AMORTECIMENTO DE ROTAÃ‡ÃƒO
        .setCanSleep(true)
    }

    // ==================================================
    // PONTOS FÃSICOS DA LANYARD
    // MEXER NESSES X/Y/Z ALTERA A QUEDA / CURVA INICIAL DA FITA
    // ==================================================
    const fixed = world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(0, 4, 0)) // PONTO FIXO NO TOPO
    const j1 = world.createRigidBody(segmentDesc(0.5, 4, 0))
    const j2 = world.createRigidBody(segmentDesc(1.0, 4, 0))
    const j3 = world.createRigidBody(segmentDesc(1.5, 4, 0))
    const card = world.createRigidBody(segmentDesc(2.0, 4, 0))

    world.createCollider(RAPIER.ColliderDesc.ball(0.1), j1)
    world.createCollider(RAPIER.ColliderDesc.ball(0.1), j2)
    world.createCollider(RAPIER.ColliderDesc.ball(0.1), j3)
    world.createCollider(RAPIER.ColliderDesc.cuboid(0.8, 1.125, 0.04), card) // ÃREA FÃSICA DO CRACHÃ

    // ==================================================
    // TAMANHO DOS TRECHOS DA LANYARD
    // O "1" AQUI Ã‰ O COMPRIMENTO DE CADA TRECHO DA CORDA/FITA
    // ==================================================
    world.createImpulseJoint(RAPIER.JointData.rope(1, { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 0 }), fixed, j1, true)
    world.createImpulseJoint(RAPIER.JointData.rope(1, { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 0 }), j1, j2, true)
    world.createImpulseJoint(RAPIER.JointData.rope(1, { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 0 }), j2, j3, true)

    // ==================================================
    // PONTO ONDE A LANYARD CONECTA NO CARD
    // ALTERE O Y (1.48) PARA SUBIR/DESCER A CONEXÃƒO NO CRACHÃ
    // ==================================================
    world.createImpulseJoint(RAPIER.JointData.spherical({ x: 0, y: 0, z: 0 }, { x: 0, y: 1.48, z: 0 }), j3, card, true)

    function v3(v) { return new THREE.Vector3(v.x, v.y, v.z) }
    function q4(q) { return new THREE.Quaternion(q.x, q.y, q.z, q.w) }

    const curve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3()
    ])
    curve.curveType = 'chordal'

    // ==================================================
    // MATERIAL VISUAL DA LANYARD
    // ALTERE AQUI OPACIDADE / FACE / MAPA / ETC
    // ==================================================
    const bandGeometry = new THREE.BufferGeometry()
    const bandMaterial = new THREE.MeshBasicMaterial({
      map: makeBandTexture(),
      transparent: true,
      opacity: 0.98,
      side: THREE.DoubleSide,
      depthWrite: false,
      depthTest: false,
      toneMapped: false
    })
    const bandMesh = new THREE.Mesh(bandGeometry, bandMaterial)
    scene.add(bandMesh)

    // ==================================================
    // ARGOLA SUPERIOR DO TOPO
    // AQUI VOCÃŠ MUDA TAMANHO / ESPESSURA / MATERIAL / COR DA ARGOLA DO TOPO
    // ==================================================
    const topClasp = new THREE.Mesh(
      new THREE.TorusGeometry(0.12, 0.02, 18, 36),
      new THREE.MeshStandardMaterial({ color: 0x1c1c1c, metalness: 1, roughness: 0.26 })
    )
    topClasp.rotation.x = Math.PI / 2
    scene.add(topClasp)

    const group = new THREE.Group()
    scene.add(group)

    const hitPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1.92, 2.66), // ÃREA CLICÃVEL PARA ARRASTAR O CRACHÃ
      new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.001, side: THREE.DoubleSide })
    )
    group.add(hitPlane)

    // ==================================================
    // COR / MATERIAL / CORPO DO CARD ID
    // ISSO CONTROLA O VOLUME 3D DO CRACHÃ E SUA PARTE TRASEIRA BASE
    // ==================================================
    const badgeBody = new THREE.Mesh(
      new RoundedBoxGeometry(1.6, 2.25, 0.08, 6, 0.13), // LARGURA / ALTURA / ESPESSURA / ARREDONDAMENTO
      new THREE.MeshPhysicalMaterial({
        color: 0x0a0a0a,       // COR BASE DO CORPO/TRASEIRA DO CRACHÃ
        roughness: 0.42,
        metalness: 0.08,
        clearcoat: 0.24,
        clearcoatRoughness: 0.4
      })
    )
    group.add(badgeBody)

    // ==================================================
    // FRENTE DO CARD ID
    // A TEXTURA GERADA EM makeBadgeTexture() Ã‰ A FRENTE VISÃVEL
    // ==================================================
    const badgeFront = new THREE.Mesh(
      new THREE.PlaneGeometry(1.50, 2.14),
      new THREE.MeshBasicMaterial({ map: makeBadgeTexture(), transparent: false })
    )
    badgeFront.position.z = 0.042 // DISTÃ‚NCIA DA FRENTE PARA NÃƒO Z-FIGHTAR
    group.add(badgeFront)

    // ==================================================
    // SE VOCÃŠ QUISER TEXTO / ARTE NA PARTE DE TRÃS DO CARD,
    // CRIE OUTRO PLANE AQUI, COM position.z NEGATIVO.
    // EXEMPLO (MANTIDO EM COMENTÃRIO):
    //
    // const badgeBack = new THREE.Mesh(
    //   new THREE.PlaneGeometry(1.50, 2.14),
    //   new THREE.MeshBasicMaterial({ color: 0x111111 })
    // )
    // badgeBack.position.z = -0.042
    // badgeBack.rotation.y = Math.PI
    // group.add(badgeBack)
    //
    // VOCÃŠ TAMBÃ‰M PODE TROCAR O MeshBasicMaterial POR UMA TEXTURA.
    // ==================================================

    // FALLBACK CASO O GLB DA FIVELA NÃƒO CARREGUE
    const clipFallback = new THREE.Mesh(
      new THREE.BoxGeometry(0.30, 0.14, 0.08),
      new THREE.MeshStandardMaterial({ color: 0x1c1c1c, metalness: 1, roughness: 0.25 })
    )
    clipFallback.position.set(0, 1.18, 0.03) // POSIÃ‡ÃƒO DO FALLBACK DA FIVELA
    group.add(clipFallback)

    // ==================================================
    // FIVELA PRINCIPAL VIA GLB
    // AQUI ESTÃ A PARTE QUE PUXA A FIVELA "REAL"
    // ==================================================
    const gltfLoader = new GLTFLoader()
    const buckleRoot = new THREE.Group()
    buckleRoot.position.set(0, -0.89, -0.01) // POSIÃ‡ÃƒO GERAL DA FIVELA GLB NO CRACHÃ
    buckleRoot.scale.setScalar(2)        // ESCALA GERAL DA FIVELA GLB
    buckleRoot.visible = false
    group.add(buckleRoot)

    gltfLoader.load(
      'https://assets.vercel.com/image/upload/contentful/image/e5382hct74si/5huRVDzcoDwnbgrKUo1Lzs/53b6dd7d6b4ffcdbd338fa60265949e1/tag.glb',
      (gltf) => {
        const model = gltf.scene.clone(true)
        let foundVisibleMetal = false

        model.traverse((child) => {
          if (!child.isMesh) return
          const name = (child.name || '').toLowerCase()
          const keep = name.includes('clip') || name.includes('clamp') // PEÃ‡AS DA FIVELA QUE SERÃƒO MANTIDAS
          child.visible = keep
          if (keep) {
            child.material = new THREE.MeshStandardMaterial({
              color: 0x1c1c1c, // COR DA FIVELA GLB
              metalness: 1,
              roughness: 0.25
            })
            foundVisibleMetal = true
          }
        })

        if (foundVisibleMetal) {
          clipFallback.visible = false
          buckleRoot.add(model)
          buckleRoot.visible = true
        }
      },
      undefined,
      () => {
        clipFallback.visible = true
      }
    )

    // ==================================================
    // CONECTOR INFERIOR ENTRE FITA E FIVELA/CARD
    // AQUI VOCÃŠ MUDA ESPESSURA / MATERIAL / COR
    // ==================================================
    const lowerConnector = new THREE.Mesh(
      new THREE.CylinderGeometry(0.018, 0.018, 1, 16),
      new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.25, metalness: 1 })
    )
    scene.add(lowerConnector)

    // ARGOLA INFERIOR, PRÃ“XIMA DO CONECTOR
    const j3Ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.07, 0.018, 16, 24),
      new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.25, metalness: 1 })
    )
    j3Ring.rotation.x = Math.PI / 2
    scene.add(j3Ring)

    let dragged = false
    let hovered = false
    let dragOffset = new THREE.Vector3()
    const tmpVec = new THREE.Vector3()
    const tmpDir = new THREE.Vector3()

    // ==================================================
    // PONTO DE ANCORAGEM DA FITA NO CARD
    // ALTERE ESSE VECTOR3 PARA AJUSTAR ALTURA / DISTÃ‚NCIA / PROFUNDIDADE
    // DA CONEXÃƒO DA LANYARD COM A FIVELA NO CRACHÃ
    // ==================================================
    const anchorLocal = new THREE.Vector3(0, 1.32, 0.03)
    const anchorWorld = new THREE.Vector3()

    function resize() {
      const w = app.clientWidth
      const h = app.clientHeight
      camera.aspect = w / h
      camera.updateProjectionMatrix()
      renderer.setSize(w, h)
    }
    resize()
    window.addEventListener('resize', resize)

    function setPointer(e) {
      const rect = app.getBoundingClientRect()
      pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1
      pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1
    }

    function cardPosition() {
      const t = card.translation()
      return new THREE.Vector3(t.x, t.y, t.z)
    }

    app.addEventListener('pointermove', (e) => {
      setPointer(e)
      if (!dragged) {
        raycaster.setFromCamera(pointer, camera)
        const hits = raycaster.intersectObject(hitPlane, true)
        hovered = hits.length > 0
        setSgsCursor(hovered ? 'grab' : 'default')
      } else {
        setSgsCursor('grabbing')
      }
    })

    app.addEventListener('pointerdown', (e) => {
      setPointer(e)
      raycaster.setFromCamera(pointer, camera)
      const hits = raycaster.intersectObject(hitPlane, true)
      if (!hits.length) return
      dragged = true
      dragOffset.copy(hits[0].point).sub(cardPosition())
      card.setBodyType(RAPIER.RigidBodyType.KinematicPositionBased, true)
      fixed.wakeUp()
      j1.wakeUp()
      j2.wakeUp()
      j3.wakeUp()
      card.wakeUp()
      setSgsCursor('grabbing')
    })

    window.addEventListener('pointerup', () => {
      if (!dragged) return
      dragged = false
      card.setBodyType(RAPIER.RigidBodyType.Dynamic, true)
      setSgsCursor(hovered ? 'grab' : 'default')
    })

    const lerpedJ1 = new THREE.Vector3()
    const lerpedJ2 = new THREE.Vector3()
    let initLerp = false

    function animate() {
      requestAnimationFrame(animate)
      const delta = Math.min(clock.getDelta(), 1 / 30)

      if (dragged) {
        tmpVec.set(pointer.x, pointer.y, 0.5).unproject(camera)
        tmpDir.copy(tmpVec).sub(camera.position).normalize()
        tmpVec.add(tmpDir.multiplyScalar(camera.position.length()))
        fixed.wakeUp()
        j1.wakeUp()
        j2.wakeUp()
        j3.wakeUp()
        card.wakeUp()
        card.setNextKinematicTranslation({
          x: tmpVec.x - dragOffset.x,
          y: tmpVec.y - dragOffset.y,
          z: tmpVec.z - dragOffset.z
        })
      }

      world.step()

      const t1 = v3(j1.translation())
      const t2 = v3(j2.translation())
      const t3 = v3(j3.translation())
      const tf = v3(fixed.translation())
      const tc = v3(card.translation())
      const qc = q4(card.rotation())

      if (!initLerp) {
        lerpedJ1.copy(t1)
        lerpedJ2.copy(t2)
        initLerp = true
      }

      const maxSpeed = 50
      const minSpeed = 10
      const d1 = Math.max(0.1, Math.min(1, lerpedJ1.distanceTo(t1)))
      const d2 = Math.max(0.1, Math.min(1, lerpedJ2.distanceTo(t2)))

      lerpedJ1.lerp(t1, delta * (minSpeed + d1 * (maxSpeed - minSpeed)))
      lerpedJ2.lerp(t2, delta * (minSpeed + d2 * (maxSpeed - minSpeed)))

      curve.points[0].copy(t3)
      curve.points[1].copy(lerpedJ2)
      curve.points[2].copy(lerpedJ1)
      curve.points[3].copy(tf)

      const ribbonPoints = curve.getPoints(40)
      updateRibbonGeometry(bandGeometry, ribbonPoints, camera, 0.34) // LARGURA DA LANYARD AO VIVO

      topClasp.position.copy(tf)

      group.position.copy(tc)
      group.quaternion.copy(qc)
      anchorWorld.copy(anchorLocal).applyQuaternion(qc).add(tc)
      j3Ring.position.copy(t3)
      placeConnector(lowerConnector, t3, anchorWorld)

      const av = card.angvel()
      const rot = card.rotation()
      card.setAngvel({ x: av.x, y: av.y - rot.y * 0.25, z: av.z }, true)

      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
